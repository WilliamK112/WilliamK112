<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Card Tuner</title>
  <style>
    :root { color-scheme: light; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif; background:#f6f8fb; color:#0f172a; }
    .wrap { display:grid; grid-template-columns: 380px 1fr; min-height:100vh; }
    .panel { padding:16px; background:#fff; border-right:1px solid #e2e8f0; overflow:auto; }
    .preview { display:flex; align-items:center; justify-content:center; padding:20px; }
    .card { width:min(980px,95%); background:#fff; border:1px solid #dbe3ef; border-radius:14px; box-shadow:0 10px 30px rgba(15,23,42,.08); padding:16px; }
    #stage { width:100%; aspect-ratio: 16 / 8; background:#f8fafc; border:1px dashed #cbd5e1; border-radius:10px; display:flex; align-items:center; justify-content:center; overflow:hidden; user-select:none; }
    #svgHost { width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
    #svgHost svg { width:92%; height:92%; }
    h2 { margin: 0 0 8px; font-size:18px; }
    .hint { font-size:12px; color:#475569; margin:0 0 14px; }
    .group { border:1px solid #e2e8f0; border-radius:10px; padding:10px; margin:0 0 10px; }
    .group h3 { margin:0 0 8px; font-size:13px; color:#334155; }
    .row { display:grid; grid-template-columns: 88px 1fr 56px; gap:8px; align-items:center; margin:6px 0; font-size:12px; }
    input[type="range"] { width:100%; }
    .buttons { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
    button { border:1px solid #cbd5e1; background:#fff; border-radius:8px; padding:8px; cursor:pointer; font-weight:600; }
    button:hover { background:#f1f5f9; }
    .primary { background:#0f172a; color:#fff; border-color:#0f172a; }
    .primary:hover { background:#1e293b; }
    textarea { width:100%; min-height:86px; border:1px solid #cbd5e1; border-radius:8px; padding:8px; font-family: ui-monospace,SFMono-Regular,Menlo,monospace; font-size:11px; }
  </style>
</head>
<body>
  <div class="wrap">
    <aside class="panel">
      <h2>3D 微调控制台</h2>
      <p class="hint">拖拽预览区域可移动 board；滚轮缩放。下面滑条可精调所有参数。</p>

      <div class="group">
        <h3>Board Transform（主要）</h3>
        <div class="row"><label>tx</label><input id="tx" type="range" min="-120" max="120" step="1" value="0"><span id="txv">0</span></div>
        <div class="row"><label>ty</label><input id="ty" type="range" min="-120" max="120" step="1" value="16"><span id="tyv">16</span></div>
        <div class="row"><label>scaleX</label><input id="sx" type="range" min="0.2" max="3" step="0.01" value="1"><span id="sxv">1.00</span></div>
        <div class="row"><label>scaleY</label><input id="sy" type="range" min="0.2" max="3" step="0.01" value="1.85"><span id="syv">1.85</span></div>
        <div class="row"><label>rotate</label><input id="rot" type="range" min="-45" max="45" step="0.1" value="0"><span id="rotv">0.0°</span></div>
      <div class="buttons" style="margin-top:8px;">
        <button id="boardSmaller" type="button">Board -</button>
        <button id="boardLarger" type="button">Board +</button>
      </div>
      </div>

      <div class="group">
        <h3>SVG ViewBox（构图）</h3>
        <div class="row"><label>vb x</label><input id="vbx" type="range" min="-120" max="60" step="1" value="-30"><span id="vbxv">-30</span></div>
        <div class="row"><label>vb y</label><input id="vby" type="range" min="-80" max="80" step="1" value="-10"><span id="vbyv">-10</span></div>
        <div class="row"><label>vb w</label><input id="vbw" type="range" min="120" max="520" step="1" value="270"><span id="vbwv">270</span></div>
        <div class="row"><label>vb h</label><input id="vbh" type="range" min="90" max="360" step="1" value="160"><span id="vbhv">160</span></div>
      </div>

      <div class="buttons">
        <button id="reset">重置</button>
        <button id="copy" class="primary">复制参数</button>
      </div>

      <div class="group" style="margin-top:10px;">
        <h3>可直接粘贴到代码</h3>
        <textarea id="out" readonly></textarea>
      </div>
    </aside>

    <main class="preview">
      <div class="card">
        <div id="stage"><div id="svgHost"></div></div>
      </div>
    </main>
  </div>

  <script>
    const defaults = { tx:7, ty:31, sx:1.38, sy:1.38, rot:0.3, vbx:-7, vby:0, vbw:173, vbh:113 };
    const ids = ["tx","ty","sx","sy","rot","vbx","vby","vbw","vbh"];
    const state = { ...defaults };
    const fmt = (n,d=2)=>Number(n).toFixed(d).replace(/\.00$/,'');

    let svgEl, boardEl;
    const host = document.getElementById('svgHost');
    const stage = document.getElementById('stage');

    async function loadSvg() {
      try {
        const txt = await fetch('./assets/blue-gold-3d-contrib.svg').then(r=>r.text());
        host.innerHTML = txt;
        svgEl = host.querySelector('svg');
        boardEl = host.querySelector('#board');
        apply();
      } catch (e) {
        host.innerHTML = '<div style="font-size:13px;color:#b91c1c;padding:16px;line-height:1.6">SVG 加载失败（通常是 file:// 直接打开导致）。<br>请用本地地址打开：<code>http://localhost:8000/tune-3d.html</code></div>';
      }
    }

    function apply() {
      if (!svgEl || !boardEl) return;
      const {tx,ty,sx,sy,rot,barAngle,vbx,vby,vbw,vbh} = state;
      const cx = 95, cy = 58;
      boardEl.setAttribute('transform', `translate(${tx},${ty}) rotate(${rot},${cx},${cy}) scale(${sx},${sy})`);
      svgEl.setAttribute('viewBox', `${vbx} ${vby} ${vbw} ${vbh}`);

      boardEl.querySelectorAll('g.tile').forEach((tile) => {
        const base = tile.getAttribute('data-base-transform') ?? (tile.getAttribute('transform') || '');
        tile.setAttribute('data-base-transform', base);
        if (Math.abs(barAngle) < 0.001) {
          if (base) tile.setAttribute('transform', base); else tile.removeAttribute('transform');
          return;
        }
        const bb = tile.getBBox();
        const tcx = bb.x + bb.width / 2;
        const tcy = bb.y + bb.height / 2;
        const rotateExpr = `rotate(${barAngle},${tcx.toFixed(2)},${tcy.toFixed(2)})`;
        tile.setAttribute('transform', base ? `${base} ${rotateExpr}` : rotateExpr);
      });

      ids.forEach(id => {
        const v = state[id];
        document.getElementById(id).value = v;
        const node = document.getElementById(id+'v');
        if (!node) return;
        node.textContent = id==='rot' ? `${fmt(v,1)}°` : (id==='sx'||id==='sy' ? fmt(v,2) : fmt(v,0));
      });

      document.getElementById('out').value =
`# board transform\n<g id="board" transform="translate(${fmt(tx,0)},${fmt(ty,0)}) rotate(${fmt(rot,1)},95,58) scale(${fmt(sx,2)},${fmt(sy,2)})">\n\n# svg viewBox\n<svg ... viewBox="${fmt(vbx,0)} ${fmt(vby,0)} ${fmt(vbw,0)} ${fmt(vbh,0)}" preserveAspectRatio="xMidYMid meet">`;
    }

    ids.forEach(id => {
      document.getElementById(id).addEventListener('input', e => {
        state[id] = parseFloat(e.target.value);
        apply();
      });
    });

    document.getElementById('reset').onclick = () => { Object.assign(state, defaults); apply(); };
    document.getElementById('copy').onclick = async () => {
      await navigator.clipboard.writeText(document.getElementById('out').value);
      const btn = document.getElementById('copy');
      const prev = btn.textContent; btn.textContent = '已复制';
      setTimeout(()=>btn.textContent = prev, 900);
    };

    document.getElementById('boardLarger').onclick = () => {
      state.sx = Math.min(3, +(state.sx + 0.08).toFixed(2));
      state.sy = Math.min(3, +(state.sy + 0.08).toFixed(2));
      apply();
    };

    document.getElementById('boardSmaller').onclick = () => {
      state.sx = Math.max(0.2, +(state.sx - 0.08).toFixed(2));
      state.sy = Math.max(0.2, +(state.sy - 0.08).toFixed(2));
      apply();
    };

    // drag to pan board
    let dragging = false, sx0 = 0, sy0 = 0, tx0 = 0, ty0 = 0;
    stage.addEventListener('pointerdown', e => {
      dragging = true; sx0 = e.clientX; sy0 = e.clientY; tx0 = state.tx; ty0 = state.ty;
      stage.setPointerCapture(e.pointerId);
    });
    stage.addEventListener('pointermove', e => {
      if (!dragging) return;
      state.tx = Math.round(tx0 + (e.clientX - sx0));
      state.ty = Math.round(ty0 + (e.clientY - sy0));
      apply();
    });
    stage.addEventListener('pointerup', ()=> dragging = false);

    // wheel to zoom
    stage.addEventListener('wheel', e => {
      e.preventDefault();
      const delta = e.deltaY > 0 ? -0.03 : 0.03;
      state.sx = Math.min(3, Math.max(0.2, +(state.sx + delta).toFixed(2)));
      state.sy = Math.min(3, Math.max(0.2, +(state.sy + delta).toFixed(2)));
      apply();
    }, { passive:false });

    loadSvg();
  </script>
</body>
</html>
