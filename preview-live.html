<!DOCTYPE html>
<html lang="en">
<head  charset="UTF-8">
  <title>3D Tower Size Editor - Live</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; padding: 20px; text-align: center; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { font-size: 18px; margin-bottom: 15px; }
    .preview { background: linear-gradient(135deg, #05122f, #0c224f); border-radius: 10px; padding: 20px; margin: 15px 0; display: inline-block; }
    .preview svg { max-width: 100%; }
    .controls { background: #21262d; border-radius: 8px; padding: 15px; display: inline-block; text-align: left; width: 100%; box-sizing: border-box; }
    .control-group { margin-bottom: 12px; }
    label { display: inline-block; width: 120px; font-size: 13px; }
    input[type="range"] { width: 150px; cursor: pointer; vertical-align: middle; }
    .value { font-weight: bold; color: #58a6ff; margin-left: 8px; }
    .code { background: #0d1117; padding: 10px; border-radius: 6px; text-align: center; font-family: monospace; font-size: 12px; margin-top: 12px; }
    .note { font-size: 12px; color: #8b949e; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎮 拖动调整 3D 塔 - 实时预览</h1>
    <p class="note">调好后把下面的数值发给我，我更新到脚本</p>
    
    <div class="preview" id="previewContainer">
      <!-- SVG will be rendered here -->
    </div>

    <div class="controls">
      <div class="control-group">
        <label>塔高 (maxH):</label>
        <input type="range" id="maxH" min="20" max="120" value="55">
        <span id="maxHVal" class="value">55</span>
      </div>
      <div class="control-group">
        <label>最小高度 (minH):</label>
        <input type="range" id="minH" min="2" max="20" value="8">
        <span id="minHVal" class="value">8</span>
      </div>
      <div class="control-group">
        <label>水平间距 (sx):</label>
        <input type="range" id="sx" min="3" max="15" value="7">
        <span id="sxVal" class="value">7</span>
      </div>
      <div class="control-group">
        <label>垂直间距 (sy):</label>
        <input type="range" id="sy" min="2" max="10" value="5">
        <span id="syVal" class="value">5</span>
      </div>
      <div class="control-group">
        <label>起始X (ox):</label>
        <input type="range" id="ox" min="20" max="200" value="80">
        <span id="oxVal" class="value">80</span>
      </div>
      <div class="code" id="code">sx=7, sy=5, minH=8, maxH=55, ox=80</div>
    </div>
  </div>

  <script>
    const maxHInput = document.getElementById('maxH');
    const minHInput = document.getElementById('minH');
    const sxInput = document.getElementById('sx');
    const syInput = document.getElementById('sy');
    const oxInput = document.getElementById('ox');
    const preview = document.getElementById('previewContainer');
    const codeDisplay = document.getElementById('code');

    function render() {
      const maxH = parseInt(maxHInput.value);
      const minH = parseInt(minHInput.value);
      const sx = parseInt(sxInput.value);
      const sy = parseInt(syInput.value);
      const ox = parseInt(oxInput.value);

      document.getElementById('maxHVal').textContent = maxH;
      document.getElementById('minHVal').textContent = minH;
      document.getElementById('sxVal').textContent = sx;
      document.getElementById('syVal').textContent = sy;
      document.getElementById('oxVal').textContent = ox;
      codeDisplay.textContent = `sx=${sx}, sy=${sy}, minH=${minH}, maxH=${maxH}, ox=${ox}`;

      // Generate simple 3D grid
      let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="500" height="120" viewBox="0 0 500 120">`;
      svg += `<rect x="0" y="0" width="500" height="120" fill="#05122f" rx="8"/>`;
      
      const rows = 7, cols = 25;
      for (let x = 0; x < cols; x++) {
        for (let y = 0; y < rows; y++) {
          const h = minH + Math.random() * (maxH - minH);
          const bx = ox + (x - y) * sx;
          const by = 60 + (x + y) * sy * 0.5;
          
          // Simple 3D box effect
          const topColor = Math.random() > 0.5 ? '#73c6ff' : '#f0cb75';
          const leftColor = '#2b64e3';
          const rightColor = '#f0cb75';
          
          svg += `<polygon points="${bx},${by-h} ${bx+sx},${by-h+sy} ${bx},${by-h+2*sy} ${bx-sx},${by-h+sy}" fill="${topColor}" opacity="0.9"/>`;
          svg += `<polygon points="${bx-sx},${by-h+sy} ${bx},${by-h+2*sy} ${bx},${by+2*sy} ${bx-sx},${by+sy}" fill="${leftColor}"/>`;
          svg += `<polygon points="${bx+sx},${by-h+sy} ${bx},${by-h+2*sy} ${bx},${by+2*sy} ${bx+sx},${by+sy}" fill="${rightColor}" opacity="0.8"/>`;
        }
      }
      svg += `</svg>`;
      
      preview.innerHTML = svg;
    }

    [maxHInput, minHInput, sxInput, syInput, oxInput].forEach(el => {
      el.addEventListener('input', render);
    });

    render();
  </script>
</body>
</html>
