<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Preview - Drag to Resize</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; padding: 20px; text-align: center; }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { font-size: 18px; margin-bottom: 10px; }
    .preview { background: #161b22; border-radius: 12px; padding: 20px; margin: 20px 0; display: inline-block; }
    .controls { background: #21262d; border-radius: 8px; padding: 16px; display: inline-block; }
    label { display: block; margin-bottom: 8px; font-size: 14px; }
    input[type="range"] { width: 300px; cursor: pointer; }
    .value { font-weight: bold; color: #58a6ff; margin-left: 10px; }
    .code { background: #0d1117; padding: 12px; border-radius: 6px; text-align: left; font-family: monospace; font-size: 13px; margin-top: 15px; white-space: pre; overflow-x: auto; }
    .note { font-size: 12px; color: #8b949e; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎮 拖动滑块调整 3D 大小</h1>
    <p class="note">拖动后在 GitHub README 里改 width 百分比即可</p>
    
    <div class="preview">
      <img id="previewImg" src="assets/blue-gold-3d-contrib.svg" alt="3D Preview">
    </div>

    <div class="controls">
      <label>
        Width: <span id="widthValue" class="value">220%</span>
      </label>
      <input type="range" id="widthSlider" min="50" max="400" value="220">
      
      <div class="code" id="markdownCode">width="220%"</div>
    </div>
  </div>

  <script>
    const slider = document.getElementById('widthSlider');
    const value = document.getElementById('widthValue');
    const code = document.getElementById('markdownCode');
    const img = document.getElementById('previewImg');
    
    slider.addEventListener('input', () => {
      const w = slider.value;
      value.textContent = w + '%';
      img.style.width = w + '%';
      code.textContent = 'width="' + w + '%"';
    });
  </script>
</body>
</html>
